# ProSBC Automation Multi-Instance Configuration
# Updated for the prosbc-automation project with enhanced features

server {
    listen 80;
    server_name sbcapp.dipvtel.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sbcapp.dipvtel.com;

    # Updated root path for the prosbc-automation project
    root /var/www/prosbc-automation/frontend/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/sbcapp.dipvtel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sbcapp.dipvtel.com/privkey.pem;
    
    # Enhanced SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Serve frontend (Vite build output)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Enable CORS for development
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-ProSBC-Instance-ID";
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Backend API (Node.js/Express server from backend_new/)
    location /backend/ {
        proxy_pass http://localhost:3001/backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enhanced proxy settings for file uploads and long operations
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 50M;
        
        # Pass through custom headers for multi-instance support
        proxy_pass_request_headers on;
        
        # WebSocket support for real-time features
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Multi-Instance ProSBC Proxy - Dynamic routing
    # This handles requests to different ProSBC instances
    location /prosbc-instance/ {
        # This should be handled by your backend which will proxy to the correct instance
        proxy_pass http://localhost:3001/backend/api/prosbc-proxy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 50M;
    }

    # Legacy ProSBC file_dbs - kept for backward compatibility
    location /file_dbs/ {
        proxy_pass https://prosbc1nyc1.dipvtel.com:12358/file_dbs/;
        proxy_set_header Host prosbc1nyc1.dipvtel.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 50M;
    }

    # Legacy ProSBC API - kept for backward compatibility
    location /api/ {
        proxy_pass https://prosbc1nyc1.dipvtel.com:12358/;
        proxy_set_header Host prosbc1nyc1.dipvtel.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 50M;
    }

    # PhpMyAdmin for database management
    location /phpmyadmin {
        root /usr/share/;
        index index.php index.html index.htm;

        location ~ ^/phpmyadmin/(.+\.php)$ {
            try_files $uri =404;
            root /usr/share/;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~* ^/phpmyadmin/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt))$ {
            root /usr/share/;
        }
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API documentation (if you add Swagger/OpenAPI)
    location /api-docs {
        proxy_pass http://localhost:3001/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Enhanced gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/rss+xml
        image/svg+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype;

    # Enhanced security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    
    # Updated CSP for the application
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss: ws:; frame-ancestors 'self';" always;

    # Cache static assets with versioning support
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Handle versioned assets
        location ~* \.(css|js)\?v= {
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Cache HTML with short expiration
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }

    # Prevent access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|log|md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Rate limiting for API endpoints
    location /backend/api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://localhost:3001/backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 50M;
    }

    # Logging
    access_log /var/log/nginx/prosbc-automation-access.log combined;
    error_log /var/log/nginx/prosbc-automation-error.log warn;
}

# Rate limiting configuration (add this outside the server block)
http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
}
