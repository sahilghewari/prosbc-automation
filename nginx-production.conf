# Production Nginx configuration for Ubuntu deployment
# Save this as /etc/nginx/sites-available/prosbc-nap-ui

upstream backend {
    server prosbc2tpa2.dipvtel.com:12358;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # Replace with your actual domain or IP
    root /var/www/prosbc-nap-ui;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Increase client body size for large requests
    client_max_body_size 50M;

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React app routes
    location / {
        try_files $uri $uri/ /index.html;
        
        # Disable caching for HTML files
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # API proxy configuration with comprehensive error handling
    location /api/ {
        # Remove /api prefix and proxy to backend
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass https://backend;
        proxy_http_version 1.1;
        
        # Headers for proper proxying
        proxy_set_header Host prosbc2tpa2.dipvtel.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # SSL settings for HTTPS backend
        proxy_ssl_verify off;
        proxy_ssl_session_reuse on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_ciphers ECDHE+AESGCM:ECDHE+AES256:ECDHE+AES128:!aNULL:!MD5:!DSS;
        
        # Extended timeout settings for slow API (up to 3 minutes)
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_next_upstream_timeout 180s;
        
        # Buffer settings for performance
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
        
        # Error handling and retries
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        
        # Custom error pages for API
        error_page 502 503 504 /api_error.html;
    }

    # Custom error page for API timeouts
    location = /api_error.html {
        internal;
        return 503 '{"error": "Backend service temporarily unavailable. Please try again later.", "status": 503}';
        add_header Content-Type application/json;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status": "healthy", "timestamp": "$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # Logging
    access_log /var/log/nginx/prosbc-nap-ui.access.log;
    error_log /var/log/nginx/prosbc-nap-ui.error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}
